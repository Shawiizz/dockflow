---
# Transfer images to a single node via SSH streaming
# Params: node (dict), built_images (list), transfer_from_manager (bool)

- name: "Set transfer context for {{ node.name | default(node.host) }}"
  set_fact:
    _from_localhost: "{{ not (transfer_from_manager | default(false) | bool) }}"
    _key_path: "{{ '~/.ssh' if not (transfer_from_manager | default(false) | bool) else '/tmp/.ssh_transfer' }}"
    _node_name: "{{ node.name | default(node.host) }}"

- name: "Ensure SSH directory exists for {{ _node_name }}"
  file:
    path: "{{ _key_path }}"
    state: directory
    mode: '0700'
  delegate_to: "{{ 'localhost' if _from_localhost else omit }}"

- name: "Write SSH key for {{ _node_name }}"
  copy:
    content: "{{ node.private_key }}"
    dest: "{{ _key_path }}/worker_{{ _node_name }}"
    mode: '0600'
  delegate_to: "{{ 'localhost' if _from_localhost else omit }}"
  when: node.private_key is defined

- name: "Build SSH key option for {{ _node_name }}"
  set_fact:
    _ssh_key_opt: >-
      {% if node.private_key is defined %}-i {{ _key_path }}/worker_{{ _node_name }}
      {% elif node.key_file | default('') != '' %}-i {{ node.key_file }}{% endif %}

- name: "Build SSH options for {{ _node_name }}"
  set_fact:
    node_ssh_opts: >-
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o ConnectTimeout=30
      -o ServerAliveInterval=60
      {{ _ssh_key_opt | default('') | trim }}
      -p {{ node.port | default(22) }}

- name: "Check which images are already present on {{ _node_name }}"
  shell: |
    local_id=$(docker inspect --format '{{ '{{' }}.Id{{ '}}' }}' "{{ item }}" 2>/dev/null || echo "")
    remote_id=$(ssh {{ node_ssh_opts }} {{ node.user | default('root') }}@{{ node.host }} "docker images --no-trunc -q '{{ item }}'" 2>/dev/null || echo "")
    if [ -n "$local_id" ] && [ "$local_id" = "$remote_id" ]; then
      echo "up-to-date"
    else
      echo ""
    fi
  delegate_to: "{{ 'localhost' if _from_localhost else omit }}"
  loop: "{{ built_images | default([]) }}"
  register: node_image_checks
  changed_when: false
  loop_control:
    label: "{{ item }} → {{ _node_name }}"

- name: "Transfer images to {{ _node_name }}"
  shell: |
    set -e
    echo "Transferring {{ item.item }} to {{ _node_name }}..."
    docker save "{{ item.item }}" | gzip -1 | ssh {{ node_ssh_opts }} {{ node.user | default('root') }}@{{ node.host }} "gunzip | docker load"
    echo "✓ Transferred {{ item.item }}"
  delegate_to: "{{ 'localhost' if _from_localhost else omit }}"
  loop: "{{ node_image_checks.results }}"
  register: node_transfer_results
  retries: 2
  delay: 10
  until: node_transfer_results.rc == 0
  when: item.stdout == ""
  loop_control:
    label: "{{ item.item }} → {{ _node_name }}"

- name: "Verify transfer succeeded for {{ _node_name }}"
  fail:
    msg: |
      Failed to transfer image(s) to {{ _node_name }}

      {% for result in node_transfer_results.results %}
      {% if not result.skipped | default(false) and result.rc | default(0) != 0 %}
      Image: {{ result.item.item }}
      Error: {{ result.stderr | default('No error output') }}
      {% endif %}
      {% endfor %}

      Check SSH connectivity and disk space on the target node.
  when: node_transfer_results.results | selectattr('skipped', 'equalto', false) | selectattr('rc', 'defined') | selectattr('rc', 'ne', 0) | list | length > 0

- name: "Cleanup SSH key for {{ _node_name }}"
  file:
    path: "{{ _key_path }}/worker_{{ _node_name }}"
    state: absent
  delegate_to: "{{ 'localhost' if _from_localhost else omit }}"
  when: node.private_key is defined
