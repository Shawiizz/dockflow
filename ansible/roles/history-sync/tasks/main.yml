---
# History Sync role - replicates deployment history to all cluster nodes
#
# After audit-log and metrics roles write to the current manager,
# this role propagates the latest entries to all other nodes
# (other managers + workers) so that:
# - Worker-to-manager promotions preserve full history
# - Manager failover doesn't fragment history
# - Any node can serve as a read source

- name: Build list of nodes to sync to
  set_fact:
    sync_nodes: >-
      {{
        (other_managers | default([])) + (workers | default([]))
      }}

- name: Skip sync if no other nodes
  debug:
    msg: "No other nodes to sync history to (single-node cluster)"
  when: sync_nodes | length == 0

- name: Read last audit log entry
  command: tail -1 "{{ dockflow_paths.audit }}/{{ stack_name }}.log"
  register: last_audit_entry
  changed_when: false
  failed_when: false
  when: sync_nodes | length > 0

- name: Read last metrics entry
  command: tail -1 "{{ dockflow_paths.metrics }}/{{ stack_name }}/deployments.json"
  register: last_metrics_entry
  changed_when: false
  failed_when: false
  when: sync_nodes | length > 0

- name: Sync history to each node
  include_tasks: sync_to_node.yml
  loop: "{{ sync_nodes }}"
  loop_control:
    loop_var: sync_node
    label: "{{ sync_node.name | default(sync_node.host) }}"
  when:
    - sync_nodes | length > 0
    - (last_audit_entry.stdout | default('') | length > 0) or (last_metrics_entry.stdout | default('') | length > 0)
