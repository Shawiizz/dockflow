---
# Shared role: Inject Swarm deploy configuration with sensible defaults
#
# Parameters:
#   - compose_content_b64: Base64-encoded docker-compose.yml content
#   - inject_mode: 'app' (full update/rollback config) or 'accessories' (minimal restart policy)
#
# Output:
#   - injected_compose: The updated compose data as YAML string

- name: Parse compose content
  set_fact:
    _compose_data: "{{ compose_content_b64 | b64decode | from_yaml }}"

- name: Inject app deploy configuration
  set_fact:
    injected_compose: >-
      {%- set default_update = {
        'parallelism': inject_deploy_update_parallelism,
        'delay': inject_deploy_update_delay,
        'failure_action': inject_deploy_update_failure_action,
        'monitor': inject_deploy_update_monitor,
        'max_failure_ratio': inject_deploy_update_max_failure_ratio,
        'order': inject_deploy_update_order
      } -%}
      {%- set default_rollback = {
        'parallelism': inject_deploy_rollback_parallelism,
        'delay': inject_deploy_rollback_delay,
        'monitor': inject_deploy_rollback_monitor,
        'order': inject_deploy_rollback_order
      } -%}
      {%- set ns = namespace(services={}) -%}
      {%- for svc_name, svc_config in (_compose_data.services | default({})).items() -%}
        {%- set user_deploy = svc_config.deploy | default({}) -%}
        {%- set merged_update = default_update | combine(user_deploy.update_config | default({})) -%}
        {%- set merged_rollback = default_rollback | combine(user_deploy.rollback_config | default({})) -%}
        {%- set merged_deploy = user_deploy | combine({'update_config': merged_update, 'rollback_config': merged_rollback}) -%}
        {%- set _ = ns.services.update({svc_name: svc_config | combine({'deploy': merged_deploy})}) -%}
      {%- endfor -%}
      {{ _compose_data | combine({'services': ns.services}) | to_nice_yaml(indent=2, width=999) }}
  when: inject_mode | default('app') == 'app'

- name: Inject Traefik routing labels for proxied services
  # Adds Traefik deploy labels + traefik-public network to services that expose ports.
  # Only runs in 'app' mode when config.proxy is enabled and a domain is defined for the env.
  # Notes:
  #   - Labels go in deploy.labels (Swarm service labels), not container labels
  #   - Services without ports are untouched (internal/backend services)
  #   - If a service already has deploy.labels, Traefik labels are appended
  #   - If a service has no networks key, 'default' is added alongside 'traefik-public'
  #     to preserve internal stack communication
  set_fact:
    injected_compose: >-
      {%- set _data = injected_compose | from_yaml -%}
      {%- set _domain = config.proxy.domains[env] -%}
      {%- set ns = namespace(services={}, has_proxied=false) -%}
      {%- for svc_name, svc_config in (_data.services | default({})).items() -%}
        {%- if svc_config.ports is defined and svc_config.ports | length > 0 -%}
          {%- set ns.has_proxied = true -%}
          {%- set port_raw = svc_config.ports[0] | string -%}
          {%- if ':' in port_raw -%}
            {%- set svc_port = port_raw.split(':')[-1].split('/')[0] -%}
          {%- else -%}
            {%- set svc_port = port_raw.split('/')[0] -%}
          {%- endif -%}
          {%- set router_name = stack_name + '-' + svc_name -%}
          {%- set _acme_enabled = config.proxy.acme | default(true) | bool -%}
          {%- set _entrypoint = 'websecure' if _acme_enabled else 'web' -%}
          {%- set _base_labels = [
            'traefik.enable=true',
            'traefik.http.routers.' + router_name + '.rule=Host(`' + _domain + '`)',
            'traefik.http.routers.' + router_name + '.entrypoints=' + _entrypoint,
            'traefik.http.services.' + router_name + '.loadbalancer.server.port=' + svc_port
          ] -%}
          {%- if _acme_enabled -%}
            {%- set _tls_label = ['traefik.http.routers.' + router_name + '.tls.certresolver=letsencrypt'] -%}
            {%- set traefik_labels = _base_labels + _tls_label -%}
          {%- else -%}
            {%- set traefik_labels = _base_labels -%}
          {%- endif -%}
          {%- set existing_deploy = svc_config.deploy | default({}) -%}
          {%- set raw_deploy_labels = existing_deploy.labels | default([]) -%}
          {%- if raw_deploy_labels is mapping -%}
            {%- set deploy_label_list = raw_deploy_labels.items() | map('join', '=') | list -%}
          {%- else -%}
            {%- set deploy_label_list = raw_deploy_labels | list -%}
          {%- endif -%}
          {%- set new_deploy = existing_deploy | combine({'labels': deploy_label_list + traefik_labels}) -%}
          {%- if svc_config.networks is defined -%}
            {%- if svc_config.networks is mapping -%}
              {%- set current_nets = svc_config.networks.keys() | list -%}
            {%- else -%}
              {%- set current_nets = svc_config.networks | list -%}
            {%- endif -%}
            {%- set new_nets = (current_nets + ['traefik-public']) | unique -%}
          {%- else -%}
            {%- set new_nets = ['default', 'traefik-public'] -%}
          {%- endif -%}
          {%- set updated_svc = svc_config | combine({'deploy': new_deploy, 'networks': new_nets}) -%}
          {%- set _ = ns.services.update({svc_name: updated_svc}) -%}
        {%- else -%}
          {%- set _ = ns.services.update({svc_name: svc_config}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- if ns.has_proxied -%}
        {%- set top_nets = _data.networks | default({}) -%}
        {%- set traefik_net = {'traefik-public': {'external': true}} -%}
        {%- if (top_nets.keys() | list + []) | select('equalto', 'default') | list | length == 0 -%}
          {%- set traefik_net = traefik_net | combine({'default': {}}) -%}
        {%- endif -%}
        {{ _data | combine({'services': ns.services, 'networks': top_nets | combine(traefik_net)}) | to_nice_yaml(indent=2, width=999) }}
      {%- else -%}
        {{ _data | combine({'services': ns.services}) | to_nice_yaml(indent=2, width=999) }}
      {%- endif -%}
  when:
    - inject_mode | default('app') == 'app'
    - config.proxy is defined
    - config.proxy.enabled | default(false) | bool
    - config.proxy.domains is defined
    - env in config.proxy.domains

- name: Inject accessories deploy configuration
  set_fact:
    injected_compose: >-
      {%- set ns = namespace(services={}) -%}
      {%- for svc_name, svc_config in (_compose_data.services | default({})).items() -%}
        {%- set deploy = svc_config.deploy | default({}) -%}
        {%- set restart = deploy.restart_policy | default({}) -%}
        {%- set new_restart = {
          'condition': restart.condition | default(inject_deploy_restart_condition),
          'delay': restart.delay | default(inject_deploy_restart_delay),
          'max_attempts': restart.max_attempts | default(inject_deploy_restart_max_attempts)
        } -%}
        {%- set new_deploy = deploy | combine({
          'replicas': deploy.replicas | default(1),
          'restart_policy': new_restart
        }) -%}
        {%- set _ = ns.services.update({svc_name: svc_config | combine({'deploy': new_deploy})}) -%}
      {%- endfor -%}
      {{ _compose_data | combine({'services': ns.services}) | to_nice_yaml(indent=2, width=999) }}
  when: inject_mode | default('app') == 'accessories'
