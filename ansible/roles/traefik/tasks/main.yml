---
# Deploy Traefik as a Docker Swarm service with automatic HTTPS via Let's Encrypt
# Requires: Docker Swarm initialized, ports 80 and 443 open

- name: Create traefik-public overlay network
  shell: >
    docker network inspect {{ traefik_network_name }} > /dev/null 2>&1 ||
    docker network create --driver=overlay --attachable {{ traefik_network_name }}
  changed_when: false

- name: Create traefik-certs volume
  shell: >
    docker volume inspect {{ traefik_certs_volume }} > /dev/null 2>&1 ||
    docker volume create {{ traefik_certs_volume }}
  changed_when: false

- name: Write Traefik stack file
  template:
    src: traefik-stack.yml.j2
    dest: /tmp/traefik-stack.yml
    mode: '0644'

- name: Deploy Traefik stack
  shell: docker stack deploy --prune --resolve-image always -c /tmp/traefik-stack.yml {{ traefik_stack_name }}

- name: Remove temporary stack file
  file:
    path: /tmp/traefik-stack.yml
    state: absent
