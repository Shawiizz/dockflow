---
- name: Configure host machine
  hosts: all
  become: yes
  vars_files:
    - roles/portainer/vars/vault.yml

  tasks:
    - name: Ensure /var/lib/dockflow exists
      file:
        path: /var/lib/dockflow
        state: directory
        mode: '1777'

  roles:
    - role: geerlingguy.docker
      when: not (skip_docker_install | default(false) | bool)
    - role: nginx
      tags:
        - nginx
    - role: portainer
      tags:
        - portainer
