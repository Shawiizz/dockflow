services:
  web:
    image: test-web-app
    build:
      context: ../..
      dockerfile: Dockerfile.web
    ports:
      - "{{ current.env.web_port }}:80"
    deploy:
      replicas: 2
      placement:
        constraints: []
      update_config:
        parallelism: 1
        delay: 5s
        monitor: 5s
      restart_policy:
        condition: on-failure