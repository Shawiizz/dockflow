version: "3.8"

services:
  # Simple Redis for testing accessories deployment
  # Pinned to manager so the backup CLI (running from WSL) can reach it via SSH.
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      placement:
        constraints:
          - node.role == manager

volumes:
  redis_data:
