project_name: "test-app"

options:
  enable_debug_logs: true

stack_management:
  keep_releases: 3
  cleanup_on_failure: true

proxy:
  enabled: true
  acme: false
  domains:
    test: "test.local"

health_checks:
  startup_delay: 5
  on_failure: fail
  endpoints:
    - url: "http://localhost:{{ current.env.web_port }}"
      name: "web service"
      remote: true
      expected_status: 200
      retries: 5
      retry_delay: 3

backup:
  retention: 3
  compression: gzip
  accessories:
    redis:
      type: redis
