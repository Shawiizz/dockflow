services:
  test-vm-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test-vm
    container_name: dockflow-test-manager
    hostname: dockflow-test-mgr
    privileged: true
    environment:
      - SWARM_ROLE=manager
    ports:
      - "2222:22"
      - "2375:2375"
      - "8080:8080"
      - "80:80"
    volumes:
      - swarm-data:/swarm
      - /etc/ssl/certs:/etc/ssl/certs:ro
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "bash", "/healthcheck.sh"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  test-vm-worker-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test-vm
    container_name: dockflow-test-worker-1
    hostname: dockflow-test-w1
    privileged: true
    environment:
      - SWARM_ROLE=worker
      - SWARM_MANAGER_HOST=dockflow-test-mgr
    ports:
      - "2223:22"
    volumes:
      - swarm-data:/swarm
      - /etc/ssl/certs:/etc/ssl/certs:ro
    networks:
      - test-network
    depends_on:
      test-vm-manager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "/healthcheck.sh"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

volumes:
  swarm-data:
    driver: local

networks:
  test-network:
    driver: bridge
