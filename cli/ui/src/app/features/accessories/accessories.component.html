<div class="flex flex-col gap-6 animate-fade-in">
  <!-- Page Header -->
  <app-page-header title="Accessories" subtitle="Database and auxiliary services managed alongside your app">
    <p-button actions label="Refresh" icon="pi pi-refresh" severity="secondary" [outlined]="true" (onClick)="refresh()" [disabled]="loading()" [loading]="loading()" />
  </app-page-header>

  <!-- Error -->
  @if (error()) {
    <app-error-banner [message]="error()!" (retry)="refresh()" />
  }

  <!-- Loading -->
  @if (loading()) {
    <div class="grid grid-cols-[repeat(auto-fill,minmax(380px,1fr))] gap-4">
      @for (i of [1, 2]; track i) {
        <div class="p-5 flex flex-col gap-4 bg-bg-secondary border border-border-primary rounded-xl">
          <div class="flex items-center gap-3">
            <p-skeleton size="2.5rem" borderRadius="0.5rem" />
            <div class="flex-1 flex flex-col gap-1">
              <p-skeleton width="45%" height="1rem" />
              <p-skeleton width="60%" height="0.625rem" />
            </div>
          </div>
          <div class="flex flex-col gap-1.5">
            <p-skeleton width="2rem" height="0.5rem" />
            <div class="flex gap-2">
              <p-skeleton width="4.5rem" height="1.25rem" />
              <p-skeleton width="3.5rem" height="1.25rem" />
            </div>
          </div>
        </div>
      }
    </div>
  } @else if (accessories().length === 0) {
    <app-empty-state icon="pi pi-database" title="No accessories configured" description="Add accessories to your config.yml to manage databases and other services.">
      <a routerLink="/settings" class="btn-primary no-underline">
        <i class="pi pi-cog"></i>
        <span>Go to Settings</span>
      </a>
    </app-empty-state>
  } @else {
    <!-- Search -->
    <app-search-filter placeholder="Filter accessories..." (search)="searchQuery.set($event)" />

    @if (filteredAccessories().length === 0) {
      <app-empty-state icon="pi pi-search" title="No matching accessories" description="Try adjusting your search query." />
    } @else {
      <div class="grid grid-cols-[repeat(auto-fill,minmax(380px,1fr))] gap-4">
        @for (acc of filteredAccessories(); track acc.name) {
          <app-accessory-card
            [accessory]="acc"
            [actionLoading]="actionLoading()"
            (restart)="onRestart($event)"
            (stop)="onStop($event)"
            (viewLogs)="onViewLogs($event)"
          />
        }
      </div>
    }
  }

  <!-- Logs Dialog -->
  <app-accessory-logs-dialog
    [(visible)]="logsDialogVisible"
    [target]="logsTarget()"
    [logs]="logsContent()"
    [loading]="logsLoading()"
  />
</div>
