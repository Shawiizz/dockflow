<p-dialog header="Scale Service" [(visible)]="visible" [modal]="true" [style]="{ width: '24rem' }" (onShow)="onShow()">
  @if (target()) {
    <div class="flex flex-col gap-4">
      <p>Scale <strong>{{ target()!.name }}</strong> to how many replicas?</p>
      <p-inputnumber [(ngModel)]="scaleValue" [min]="0" [max]="20" [showButtons]="true" />
      <div class="flex justify-end gap-2">
        <button
          class="inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium rounded-lg border border-border-primary bg-bg-tertiary text-text-primary cursor-pointer transition-all duration-150 hover:bg-bg-hover hover:border-border-secondary disabled:opacity-50 disabled:cursor-not-allowed"
          (click)="visible.set(false)"
        >Cancel</button>
        <button
          class="inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium rounded-lg border border-transparent bg-accent text-white cursor-pointer transition-all duration-150 hover:bg-accent-hover disabled:opacity-50 disabled:cursor-not-allowed"
          (click)="onConfirm()"
          [disabled]="loading()"
        >Scale</button>
      </div>
    </div>
  }
</p-dialog>
