<div class="flex flex-col gap-4 h-full animate-fade-in">
  <!-- Page Header -->
  <app-page-header title="Logs" subtitle="View Docker service logs" />

  <!-- Services Error -->
  @if (servicesError()) {
    <app-error-banner [message]="servicesError()!" (retry)="loadServiceList(envService.selectedOrUndefined())" />
  }

  <!-- Controls -->
  <app-log-controls
    [serviceOptions]="serviceOptions()"
    [selectedService]="selectedService()"
    [tailLines]="tailLines()"
    [autoScroll]="autoScroll()"
    [autoRefresh]="autoRefresh()"
    [loading]="loading()"
    [loadingServices]="loadingServices()"
    (selectedServiceChange)="selectedService.set($event); onServiceChange()"
    (tailLinesChange)="tailLines.set($event); onTailChange()"
    (autoScrollChange)="autoScroll.set($event)"
    (autoRefreshChange)="autoRefresh.set($event)"
    (refresh)="loadLogs()"
  />

  <!-- Logs Error -->
  @if (error()) {
    <app-error-banner [message]="error()!" (retry)="loadLogs()" />
  }

  <!-- Log Viewer -->
  <app-log-viewer
    [logs]="logs()"
    [loading]="loading()"
    [selectedService]="selectedService()"
  />
</div>
