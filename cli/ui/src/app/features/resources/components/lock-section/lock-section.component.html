<div class="flex flex-col gap-4 p-6 bg-bg-secondary border border-border-primary rounded-xl">
  <div class="flex items-center justify-between">
    <h3 class="m-0 text-base font-semibold text-text-primary">Deploy Lock</h3>
    <p-button
      icon="pi pi-refresh"
      [text]="true"
      [rounded]="true"
      severity="secondary"
      [loading]="loading()"
      (onClick)="refresh.emit()"
      ariaLabel="Refresh"
    />
  </div>

  @if (error()) {
    <app-error-banner [message]="error()!" (retry)="refresh.emit()" />
  } @else if (loading()) {
    <p-skeleton width="60%" height="1rem" />
  } @else {
    @if (lockInfo().locked) {
      <div class="flex items-center gap-2">
        <p-tag [value]="lockInfo().isStale ? 'Stale Lock' : 'Locked'" [severity]="lockInfo().isStale ? 'warn' : 'danger'" />
        <span class="text-sm text-text-muted">by {{ lockInfo().performer }} ({{ lockInfo().durationMinutes }}min ago)</span>
      </div>
      @if (lockInfo().message) {
        <p class="text-sm text-text-muted m-0">{{ lockInfo().message }}</p>
      }
      <p-button
        label="Release Lock"
        icon="pi pi-lock-open"
        severity="danger"
        [loading]="actioning()"
        (onClick)="release.emit()"
        class="self-start"
      />
    } @else {
      <div class="flex items-center gap-2">
        <p-tag value="Unlocked" severity="success" />
        <span class="text-sm text-text-muted">No active deploy lock</span>
      </div>
      <p-button
        label="Acquire Lock"
        icon="pi pi-lock"
        severity="secondary"
        [outlined]="true"
        [loading]="actioning()"
        (onClick)="acquire.emit()"
        class="self-start"
      />
    }
  }
</div>
