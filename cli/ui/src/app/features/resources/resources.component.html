<div class="flex flex-col gap-6 animate-fade-in">
  <!-- Page Header -->
  <app-page-header title="Resources" subtitle="Docker resource management, locks, and disk usage" />

  <!-- Prune Section -->
  <app-prune-section
    [pruning]="pruning()"
    [results]="pruneResults()"
    (prune)="runPrune($event)"
  />

  <!-- Lock Section -->
  <app-lock-section
    [lockInfo]="lockInfo()"
    [loading]="lockLoading()"
    [error]="lockError()"
    [actioning]="lockActioning()"
    (refresh)="refreshLock()"
    (acquire)="acquireLock()"
    (release)="releaseLock()"
  />

  <!-- Disk Usage Section -->
  <app-disk-usage-section
    [raw]="diskRaw()"
    [loading]="diskLoading()"
    [error]="diskError()"
    (refresh)="refreshDisk()"
  />
</div>
