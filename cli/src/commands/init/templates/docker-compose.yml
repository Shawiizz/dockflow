# Docker Compose stack configuration
# Full reference: https://dockflow.dev/configuration/docker-compose
#
# Dockflow automatically injects Swarm defaults (update_config, rollback_config,
# restart_policy). Override them here if needed. image tag is managed by dockflow.

services:
  app:
    image: {{ project_name }}
    ports:
      - "3000:3000"
    deploy:
      replicas: 1

