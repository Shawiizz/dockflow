<div class="flex flex-col gap-6 animate-fade-in">
  <!-- Page Header -->
  <div class="flex justify-between items-start gap-4 flex-wrap">
    <div>
      <h1 class="m-0 text-2xl font-semibold text-text-primary">Resources</h1>
      <p class="mt-1 mb-0 text-sm text-text-muted">Docker resource management, locks, and disk usage</p>
    </div>
  </div>

  <!-- Prune Section -->
  <app-prune-section
    [pruning]="pruning()"
    [results]="pruneResults()"
    (prune)="runPrune($event)"
  />

  <!-- Lock Section -->
  <app-lock-section
    [lockInfo]="lockInfo()"
    [loading]="lockLoading()"
    [error]="lockError()"
    [actioning]="lockActioning()"
    (refresh)="refreshLock()"
    (acquire)="acquireLock()"
    (release)="releaseLock()"
  />

  <!-- Disk Usage Section -->
  <app-disk-usage-section
    [raw]="diskRaw()"
    [loading]="diskLoading()"
    [error]="diskError()"
    (refresh)="refreshDisk()"
  />
</div>
