<div class="flex flex-col gap-4 p-6 bg-bg-secondary border border-border-primary rounded-xl">
  <div class="flex items-center justify-between">
    <h3 class="m-0 text-base font-semibold text-text-primary">Disk Usage</h3>
    <button
      class="inline-flex items-center justify-center p-2 text-sm rounded-lg border-none bg-transparent text-text-secondary cursor-pointer transition-all duration-150 hover:bg-bg-hover hover:text-text-primary disabled:opacity-50 disabled:cursor-not-allowed"
      (click)="refresh.emit()"
      [disabled]="loading()"
    >
      <i class="pi pi-refresh text-base" [class.pi-spin]="loading()"></i>
    </button>
  </div>

  @if (error()) {
    <div class="flex items-center gap-2 p-3 bg-error-muted text-error rounded-lg">
      <i class="pi pi-exclamation-triangle"></i>
      <span class="text-sm">{{ error() }}</span>
    </div>
  } @else if (loading()) {
    <p-skeleton width="100%" height="5rem" />
  } @else if (raw()) {
    <pre class="m-0 p-4 bg-bg-tertiary rounded-lg text-sm text-text-primary font-mono overflow-x-auto">{{ raw() }}</pre>
  } @else {
    <p class="text-text-muted text-sm m-0">No data available</p>
  }
</div>
