<div class="bg-bg-secondary border border-border-primary rounded-xl px-5 py-4">
  <div class="flex flex-wrap items-end gap-4">
    <div class="flex flex-col gap-1 min-w-[160px]">
      <span class="text-xs font-medium text-text-muted uppercase tracking-wide">Service</span>
      @if (loadingServices()) {
        <p-skeleton width="100%" height="2.25rem" />
      } @else {
        <p-select
          [options]="serviceOptions()"
          [ngModel]="selectedService()"
          (ngModelChange)="onServiceChange($event)"
          optionLabel="label"
          optionValue="value"
          placeholder="Select a service"
          emptyMessage="No services available"
          size="small"
        />
      }
    </div>
    <div class="flex flex-col gap-1 min-w-[160px]">
      <span class="text-xs font-medium text-text-muted uppercase tracking-wide">Lines</span>
      <p-select
        [options]="tailOptions"
        [ngModel]="tailLines()"
        (ngModelChange)="onTailChange($event)"
        optionLabel="label"
        optionValue="value"
        size="small"
      />
    </div>
    <div class="flex flex-col gap-1 items-center">
      <span class="text-xs font-medium text-text-muted uppercase tracking-wide">Auto-scroll</span>
      <p-toggleswitch [ngModel]="autoScroll()" (ngModelChange)="autoScrollChange.emit($event)" />
    </div>
    <div class="flex flex-col gap-1 items-center">
      <span class="text-xs font-medium text-text-muted uppercase tracking-wide">Auto-refresh (5s)</span>
      <p-toggleswitch [ngModel]="autoRefresh()" (ngModelChange)="autoRefreshChange.emit($event)" />
    </div>
    <div class="flex gap-2 ml-auto">
      <button
        class="inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium rounded-lg border border-border-primary bg-bg-tertiary text-text-primary cursor-pointer transition-all duration-150 hover:bg-bg-hover hover:border-border-secondary disabled:opacity-50 disabled:cursor-not-allowed"
        (click)="refresh.emit()"
        [disabled]="loading() || !selectedService()"
      >
        <i class="pi pi-refresh" [class.pi-spin]="loading()"></i>
        <span>Refresh</span>
      </button>
    </div>
  </div>
</div>
