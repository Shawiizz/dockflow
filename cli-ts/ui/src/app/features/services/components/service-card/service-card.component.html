<div class="flex flex-col bg-bg-secondary border border-border-primary rounded-xl overflow-hidden transition-colors hover:border-border-secondary">
  <div class="flex flex-col gap-1 p-4">
    <div class="flex items-center justify-between gap-2">
      <h3 class="m-0 text-[0.9375rem] font-semibold text-text-primary truncate" [pTooltip]="service().name">{{ service().name }}</h3>
      <p-tag [value]="service().state" [severity]="stateSeverity(service().state)" />
    </div>
    <span class="text-xs text-text-muted font-mono truncate">{{ service().image }}</span>
  </div>

  <div class="flex flex-col gap-1.5 px-4 pb-3">
    <div class="flex justify-between items-center">
      <span class="text-xs text-text-muted uppercase tracking-wide">Replicas</span>
      <span class="text-[0.8125rem] font-semibold text-text-secondary font-mono">{{ service().replicasRunning }}/{{ service().replicas }}</span>
    </div>
    <div class="h-1 rounded-full bg-bg-tertiary overflow-hidden">
      <div class="h-full rounded-full transition-all duration-300" [class]="replicaFillClass()" [style.width.%]="replicaPercent()"></div>
    </div>
  </div>

  @if (service().ports.length > 0) {
    <div class="flex flex-wrap gap-1.5 px-4 pb-3">
      @for (port of service().ports; track port) {
        <p-tag [value]="port" severity="contrast" />
      }
    </div>
  }

  <div class="flex gap-1 justify-end mt-auto pt-2 pb-3 px-4 border-t border-border-primary">
    @if (service().state === 'stopped') {
      <p-button
        icon="pi pi-play"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        pTooltip="Start"
        ariaLabel="Start"
        (onClick)="start.emit(service())"
        [disabled]="!!actionLoading()"
        [loading]="actionLoading() === service().name"
      />
    } @else {
      <p-button
        icon="pi pi-refresh"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        pTooltip="Restart"
        ariaLabel="Restart"
        (onClick)="restart.emit({ event: $event, service: service() })"
        [disabled]="!!actionLoading()"
        [loading]="actionLoading() === service().name"
      />
      <p-button
        icon="pi pi-stop-circle"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        pTooltip="Stop"
        ariaLabel="Stop"
        (onClick)="stop.emit({ event: $event, service: service() })"
        [disabled]="!!actionLoading()"
      />
    }
    <p-button
      icon="pi pi-arrows-alt"
      [text]="true"
      [rounded]="true"
      severity="secondary"
      pTooltip="Scale"
      ariaLabel="Scale"
      (onClick)="scale.emit(service())"
      [disabled]="!!actionLoading()"
    />
    @if (service().state !== 'stopped') {
      <p-button
        icon="pi pi-undo"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        pTooltip="Rollback"
        ariaLabel="Rollback"
        (onClick)="rollback.emit({ event: $event, service: service() })"
        [disabled]="!!actionLoading()"
      />
      <p-button
        icon="pi pi-code"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        pTooltip="Terminal"
        ariaLabel="Terminal"
        (onClick)="exec.emit(service())"
        [disabled]="!!actionLoading()"
      />
    }
    <a
      [routerLink]="['/logs']"
      [queryParams]="{ service: service().name }"
      class="btn-icon"
      pTooltip="View logs"
      aria-label="View logs"
    >
      <i class="pi pi-file-edit"></i>
    </a>
  </div>
</div>
