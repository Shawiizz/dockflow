<div class="flex flex-col gap-6 animate-fade-in">
  <!-- Page Header -->
  <div class="flex justify-between items-start gap-4 flex-wrap">
    <div>
      <h1 class="m-0 text-2xl font-semibold text-text-primary">Monitoring</h1>
      <p class="mt-1 mb-0 text-sm text-text-muted">Container stats and audit log</p>
    </div>
  </div>

  <p-tabs [(value)]="activeTab">
    <p-tablist>
      <p-tab [value]="0">Container Stats</p-tab>
      <p-tab [value]="1">Audit Log</p-tab>
    </p-tablist>

    <p-tabpanels>
      <p-tabpanel [value]="0">
        <app-container-stats-table
          [containers]="containers()"
          [loading]="statsLoading()"
          [error]="statsError()"
          [timestamp]="statsTimestamp()"
          [autoRefresh]="autoRefresh()"
          (refresh)="refreshStats()"
          (toggleAutoRefresh)="toggleAutoRefresh()"
        />
      </p-tabpanel>

      <p-tabpanel [value]="1">
        <app-audit-log-table
          [entries]="auditEntries()"
          [loading]="auditLoading()"
          [error]="auditError()"
          (refresh)="refreshAudit()"
        />
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
