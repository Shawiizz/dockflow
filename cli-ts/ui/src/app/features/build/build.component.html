<div class="flex flex-col gap-6 animate-fade-in">
  <!-- Page Header -->
  <div class="flex justify-between items-start gap-4 flex-wrap">
    <div>
      <h1 class="m-0 text-2xl font-semibold text-text-primary">Build</h1>
      <p class="mt-1 mb-0 text-sm text-text-muted">Build Docker images for your services</p>
    </div>
  </div>

  <div class="flex flex-col gap-4 p-6 bg-bg-secondary border border-border-primary rounded-xl">
    <div class="flex flex-wrap gap-4">
      <div class="flex flex-col gap-1 min-w-[10rem]">
        <label class="text-sm text-text-muted">Services filter</label>
        <input type="text" pInputText [(ngModel)]="servicesFilter" placeholder="e.g. web,api" class="w-full">
      </div>
    </div>
    <div class="flex flex-wrap gap-4">
      <div class="flex items-center gap-2">
        <p-checkbox [(ngModel)]="push" [binary]="true" inputId="push" />
        <label for="push">Push to registry</label>
      </div>
    </div>
    <div class="flex gap-2">
      <button
        class="inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium rounded-lg border border-transparent bg-accent text-white cursor-pointer transition-all duration-150 hover:bg-accent-hover disabled:opacity-50 disabled:cursor-not-allowed"
        (click)="startBuild()"
        [disabled]="building() || !envService.selectedOrUndefined()"
      >
        <i class="pi pi-hammer"></i>
        <span>{{ building() ? 'Building...' : 'Build' }}</span>
      </button>
      @if (building()) {
        <button
          class="inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium rounded-lg border border-transparent bg-error text-white cursor-pointer transition-all duration-150 hover:bg-red-600 disabled:opacity-50 disabled:cursor-not-allowed"
          (click)="cancelBuild()"
        >
          <i class="pi pi-times"></i>
          <span>Cancel</span>
        </button>
      }
    </div>
  </div>

  @if (buildLogs().length > 0) {
    <div class="bg-bg-secondary border border-border-primary rounded-xl overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3 border-b border-border-primary">
        <span class="text-sm font-medium text-text-primary">Output</span>
        @if (buildSuccess() === true) {
          <p-tag value="Success" severity="success" [rounded]="true" />
        } @else if (buildSuccess() === false) {
          <p-tag value="Failed" severity="danger" [rounded]="true" />
        } @else if (building()) {
          <p-tag value="Running" severity="info" [rounded]="true" />
        }
      </div>
      <div #outputContainer class="bg-[#0a0a0a] text-[#fafafa] font-mono text-[0.8125rem] p-4 max-h-[30rem] overflow-y-auto whitespace-pre-wrap break-all">
        @for (line of buildLogs(); track $index) {
          <div>{{ line }}</div>
        }
      </div>
    </div>
  }
</div>
