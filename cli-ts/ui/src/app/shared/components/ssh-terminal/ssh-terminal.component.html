<p-dialog
  [header]="'SSH: ' + serverName()"
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '80vw', height: '75vh' }"
  [contentStyle]="{ padding: 0, overflow: 'hidden', display: 'flex', flexDirection: 'column' }"
  (onShow)="onDialogShow()"
  (onHide)="onDialogHide()"
  styleClass="ssh-dialog"
>
  <!-- Status Bar -->
  <div class="flex items-center px-4 py-2 bg-bg-tertiary border-b border-border-primary text-xs">
    @if (connecting()) {
      <span class="flex items-center gap-2 font-medium text-accent">
        <i class="pi pi-spin pi-spinner"></i>
        <span>Connecting...</span>
      </span>
    } @else if (connected()) {
      <span class="flex items-center gap-2 font-medium text-success">
        <span class="size-1.5 rounded-full bg-success"></span>
        <span>Connected to {{ serverHost() || serverName() }}</span>
      </span>
    } @else if (error()) {
      <span class="flex items-center gap-2 font-medium text-error">
        <i class="pi pi-exclamation-triangle"></i>
        <span>{{ error() }}</span>
      </span>
    } @else {
      <span class="flex items-center gap-2 font-medium text-text-muted">
        <span class="size-1.5 rounded-full bg-text-muted"></span>
        <span>Disconnected</span>
      </span>
    }
  </div>

  <!-- Terminal Container -->
  <div class="flex-1 bg-[#0a0a0a] p-2 overflow-hidden" #terminalEl></div>
</p-dialog>
