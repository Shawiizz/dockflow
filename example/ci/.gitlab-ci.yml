stages:
  - build
  - deploy

# Configuration:
# 1. Make sure your .dockflow/config.yml has project_name set:
#    project_name: "my-app"
#
# 2. Define your .dockflow/servers.yml with servers
#
# 3. Add CI/CD variables for each server:
#    - PRODUCTION_MAIN_SERVER_CONNECTION: base64-encoded JSON connection string
#
#    The connection string is generated by `dockflow setup` at the end of the wizard.
#    Format: base64({"host":"...","port":22,"user":"...","privateKey":"..."})

# CI: Build images on branch push
build:
  stage: build
  image: node:22
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apt-get update && apt-get install -y docker.io
  script:
    - npx @dockflow-tools/cli build
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always

# CD: Deploy on tag push (e.g., 1.0.0 → production, 1.0.0-staging → staging)
deploy:
  stage: deploy
  image: node:22
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apt-get update && apt-get install -y docker.io
  script:
    - npx @dockflow-tools/cli deploy
  rules:
    - if: $CI_COMMIT_TAG
