name: CI/CD

on:
  push:
    branches:
      - '*'
    tags:
      - '*'

# Configuration:
# 1. Make sure your .dockflow/config.yml has project_name set:
#    project_name: "my-app"
#
# 2. Define your .dockflow/servers.yml with servers
#
# 3. Add GitHub secrets for each server:
#    - PRODUCTION_MAIN_SERVER_CONNECTION: base64-encoded JSON connection string
#
#    The connection string is generated by `dockflow setup` at the end of the wizard.
#    Format: base64({"host":"...","port":22,"user":"...","privateKey":"..."})

jobs:
  # CI: Build images on branch push
  build:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: npx @dockflow-tools/cli build
        env:
          DOCKFLOW_SECRETS: ${{ toJSON(secrets) }}

  # CD: Deploy on tag push (e.g., 1.0.0 → production, 1.0.0-staging → staging)
  deploy:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: npx @dockflow-tools/cli deploy
        env:
          DOCKFLOW_SECRETS: ${{ toJSON(secrets) }}
