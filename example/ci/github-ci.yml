name: CI/CD

on:
  push:
    branches:
      - '*'
    tags:
      - '*'

# Configuration:
# 1. Make sure your .dockflow/config.yml has project_name set:
#    project_name: "my-app"
#
# 2. Define your .dockflow/servers.yml with servers
#
# 3. Add GitHub secrets for each server:
#    - PRODUCTION_MAIN_SERVER_CONNECTION: base64-encoded connection string
#
#    Create connection string:
#    echo -n "user@host:22|$(cat ~/.ssh/id_rsa)" | base64

jobs:
  # CI: Build images on branch push
  build:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: npx @dockflow-tools/cli@2.0.23 build
        env:
          DOCKFLOW_SECRETS: ${{ toJSON(secrets) }}

  # CD: Deploy on tag push (e.g., 1.0.0 → production, 1.0.0-staging → staging)
  deploy:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: npx @dockflow-tools/cli@2.0.23 deploy
        env:
          DOCKFLOW_SECRETS: ${{ toJSON(secrets) }}
