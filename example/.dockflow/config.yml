# Project configuration (required in v2.0+)
# This is the unique identifier for your project
project_name: "my-app"

options:
  image_auto_tag: true       # Auto-append -<env>:<version> to image names (default: true)
  enable_debug_logs: false   # Enable detailed deployment logs (default: false)
  remote_build: false        # Build Docker images on remote server instead of CI/CD (default: false)

# Docker Registry configuration (optional)
# When configured, built images will be pushed to this registry
registry:
  # Registry type: local (no push), dockerhub, ghcr, gitlab, or custom
  type: dockerhub

  # Enable or disable registry push (default: true when registry block is present)
  enabled: false

  # Registry hostname (e.g., docker.io, registry.gitlab.com, ghcr.io)
  url: "docker.io"

  # Registry namespace/organization (e.g., myorg, myusername)
  # Full image name will be: {url}/{namespace}/{image}:{tag}
  namespace: ""

  # Credentials (use CI secrets — add REGISTRY_USERNAME, REGISTRY_PASSWORD to your CI/CD)
  # Resolved via Nunjucks: secrets from servers.yml env or CI are available as {{ current.env.xxx }}
  # For basic auth:
  username: "{{ current.env.registry_username }}"
  password: "{{ current.env.registry_password }}"

  # For token auth (e.g., GitHub Personal Access Token):
  token: "{{ current.env.registry_token }}"
  
  # Additional tags to apply (besides the version tag)
  # Available variables: {version}, {env}, {branch}, {sha}
  additional_tags:
    - "latest"  # Always tag as latest
    # - "{env}"  # Tag with environment name
    # - "{branch}-latest"  # Tag with branch name

# Stack management configuration (optional)
# Manages releases and cleanup of old deployments
stack_management:
  # Number of previous releases to keep for rollback
  # Each release contains a docker-compose.yml, metadata.json with images list
  # Older releases and their images are automatically cleaned up
  # Default: 3 releases kept
  keep_releases: 3
  
  # Clean up failed deployment images immediately
  # When true: if health check fails with on_failure='fail', stops containers and deletes images
  # When false: failed images are kept on the system
  # Default: true
  cleanup_on_failure: true

# Health checks configuration (optional)
health_checks:
  # Enable or disable health checks (default: true)
  enabled: true
  
  # Time to wait after deployment before running health checks (in seconds)
  # This allows your application time to fully start up
  startup_delay: 15
  
  # What to do when a health check fails:
  # - "fail": Stop the deployment and mark it as failed
  # - "notify": Continue deployment but show warnings
  # - "ignore": Run checks but don't affect deployment status
  # - "rollback": Stop new containers, remove new images, and restart previous containers
  on_failure: "rollback"
  
  # List of endpoints to check
  # These URLs are called directly from the CLI machine — use the server's public IP or domain.
  endpoints:
    # Example: Main application health endpoint
    - name: "Main Application Health"
      url: "http://localhost:3000/health"
      expected_status: 200
      timeout: 30
      retries: 3
      retry_delay: 5

    # Example: API status endpoint
    - name: "API Status"
      url: "http://localhost:3000/api/status"
      expected_status: 200
      timeout: 15

    # Example: Database connectivity check
    - name: "Database Connection"
      url: "http://localhost:3000/health/db"
      expected_status: 200
      timeout: 20
      retries: 5
      retry_delay: 10